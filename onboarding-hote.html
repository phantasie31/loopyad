<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Configuration — LoopyAd</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bleu-fonce: #003366; --bleu-cyan: #00D1FF; --gris-fond: #F8FAFC; --rouge: #EF4444; }
        body { font-family: 'Inter', sans-serif; background: var(--gris-fond); margin: 0; color: #1a1a1a; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 80px; background: white; border-bottom: 1px solid #E2E8F0; }
        .logo { height: 35px; }
        .progression { display: flex; align-items: center; gap: 15px; font-size: 13px; font-weight: 700; color: #64748B; }
        .barre-progression { width: 100px; height: 6px; background: #E2E8F0; border-radius: 10px; }
        .barre-remplie { width: 100%; height: 100%; background: var(--bleu-cyan); border-radius: 10px; }

        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 32px; font-weight: 900; color: var(--bleu-fonce); text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #64748B; margin-bottom: 40px; font-style: italic; }

        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .type-item { 
            background: white; padding: 20px; border-radius: 15px; text-align: center; 
            border: 2px solid transparent; cursor: pointer; transition: 0.2s;
            font-weight: 700; color: var(--bleu-fonce); box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .type-item:hover { border-color: var(--bleu-cyan); background: #f0fdff; }
        .type-item.selected { border-color: var(--bleu-cyan); background: #e6fbff; box-shadow: 0 0 0 2px var(--bleu-cyan); }

        .form-section { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--bleu-fonce); margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; 
            background: #F8FAFC; margin-bottom: 20px; box-sizing: border-box; font-family: 'Inter';
        }

        .btn-finish { 
            width: 100%; background: linear-gradient(135deg, var(--bleu-cyan) 0%, #001A33 100%); 
            color: white; padding: 20px; border: none; border-radius: 12px; 
            font-weight: 800; font-size: 16px; cursor: pointer; transition: transform 0.2s;
        }
        .btn-finish:hover { transform: translateY(-2px); }
        .btn-finish:disabled { opacity: 0.7; cursor: not-allowed; }

        #error-msg { color: var(--rouge); font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="https://i.ibb.co/SHgMNn6/loppyad4.png" class="logo" alt="LoopyAd"></a>
        <div class="progression">
            <span>Étape 2 sur 2</span>
            <div class="barre-progression"><div class="barre-remplie"></div></div>
        </div>
    </nav>

    <div class="container">
        <h1>Type de commerce</h1>
        <p class="subtitle">"Nous configurons votre écran 4K offert selon votre trafic."</p>

        <div class="type-grid" id="typeGrid">
            <div class="type-item" onclick="selectType(this)">☕ Bar / Café</div>
            <div class="type-item" onclick="selectType(this)">🍽️ Restaurant</div>
            <div class="type-item" onclick="selectType(this)">✂️ Beauté / Coiffeur</div>
            <div class="type-item" onclick="selectType(this)">🛒 Épicerie</div>
            <div class="type-item" onclick="selectType(this)">🏋️ Sport / Gym</div>
            <div class="type-item" onclick="selectType(this)">🏠 Autre</div>
        </div>

        <form class="form-section" id="onboardingForm">
            <label>Fréquentation quotidienne (Estimation visiteurs/jour)</label>
            <input type="number" id="frequentation" placeholder="ex: 150" required>

            <div id="error-msg">⚠️ Une erreur est survenue lors de la mise à jour.</div>
            <button type="submit" id="btnSubmit" class="btn-finish">Activer mon écran LoopyAd →</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://srfxehetueqazykzwrhw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyZnhlaGV0dWVxYXp5a3p3cmh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjQ4NjksImV4cCI6MjA5MjU0MDg2OX0.tqw6lik68x0js0VVm-xAuLFZ17mFf3LM6h5g85eow68';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectedTypeLabel = "";

        function selectType(element) {
            document.querySelectorAll('.type-item').forEach(item => item.classList.remove('selected'));
            element.classList.add('selected');
            selectedTypeLabel = element.innerText;
            document.getElementById('error-msg').style.display = "none";
        }

        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const errorDiv = document.getElementById('error-msg');
            const freq = parseInt(document.getElementById('frequentation').value);
            
            if (!selectedTypeLabel) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "⚠️ Sélectionnez le type de commerce ci-dessus.";
                return;
            }

            errorDiv.style.display = "none";
            btn.innerText = "Configuration en cours...";
            btn.disabled = true;

            // Calcul du profil selon la fréquentation
            let categorie = "Standard";
            if (freq >= 200) categorie = "Premium";
            else if (freq < 120) categorie = "Essentiel";

            try {
                const { error } = await _supabase
                    .from('ecrans')
                    .update({ 
                        visiteurs_jour: freq,
                        type: categorie
                    })
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (!error) {
                    window.location.href = "dashboard-hote.html";
                } else {
                    throw error;
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerText = "Activer mon écran LoopyAd →";
                errorDiv.style.display = "block";
                errorDiv.innerText = "⚠️ Erreur : Impossible de mettre à jour le profil.";
            }
        });
    </script>
</body>
</html>
