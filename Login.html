<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — LoopyAd</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bleu-fonce: #003366; --gris-fond: #F8FAFC; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--gris-fond); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        /* ESPACEMENT PRO : On centre et on donne de l'air */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center; /* Centre verticalement */
            justify-content: center; /* Centre horizontalement */
            padding: 100px 20px; /* Grosses marges haut/bas pour le look épuré */
        }

        .login-card { 
            background: white; 
            padding: 48px; /* Plus d'espace interne */
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
            width: 100%; 
            max-width: 460px; 
            text-align: center; 
        }

        label { display: block; text-align: left; font-weight: 700; font-size: 13px; margin-bottom: 8px; color: #334155; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid #E2E8F0; 
            margin-bottom: 24px; 
            box-sizing: border-box; 
            font-family: inherit; 
            background-color: #F8FAFC;
        }

        .btn-login { 
            width: 100%; 
            background: var(--bleu-fonce); 
            color: white; 
            padding: 18px; 
            border-radius: 16px; 
            font-weight: 800; 
            border: none; 
            cursor: pointer; 
            font-size: 16px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-login:hover { background: #002d5a; transform: translateY(-1px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center py-6 px-20 bg-white border-b border-slate-100">
        <a href="index.html"><img src="https://i.ibb.co/SHgMNn6/loppyad4.png" class="h-[38px]" alt="LoopyAd"></a>
        <div class="flex items-center gap-6">
            <a href="Login.html" class="text-[14px] font-bold text-slate-600 hover:text-black transition">Connexion</a>
            <a href="choix-inscription.html" class="text-[14px] font-bold bg-black text-white px-6 py-3 rounded-full hover:bg-zinc-800 transition">Inscription</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="login-card">
            <h1 class="text-[32px] font-black text-[#003366] mb-3 tracking-tight">Bon retour !</h1>
            <p id="form-subtitle" class="text-slate-400 text-[16px] mb-10">Connectez-vous à votre espace Annonceur</p>
            
            <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-10">
                <button id="btn-annonceur" class="flex-1 py-3 rounded-xl font-bold text-[13px] bg-white shadow-sm text-[#003366]" onclick="switchTab('annonceur')">Annonceur</button>
                <button id="btn-hote" class="flex-1 py-3 rounded-xl font-bold text-[13px] text-slate-500" onclick="switchTab('hote')">Hôte</button>
            </div>

            <form id="login-form">
                <label>Adresse Email</label>
                <input type="email" id="email" placeholder="nom@exemple.com" required>
                
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
                
                <button type="button" id="btn-submit" onclick="handleLogin()" class="btn-login">Se connecter</button>
            </form>

            <div class="mt-10 text-[14px] text-slate-400">
                Pas encore de compte ? <a href="choix-inscription.html" class="text-[#003366] font-bold hover:underline">S'inscrire</a>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const SUPABASE_URL = 'https://srfxehetueqazykzwrhw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyZnhlaGV0dWVxYXp5a3p3cmh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjQ4NjksImV4cCI6MjA5MjU0MDg2OX0.tqw6lik68x0js0VVm-xAuLFZ17mFf3LM6h5g85eow68';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

        function switchTab(type) {
            const btnA = document.getElementById('btn-annonceur');
            const btnH = document.getElementById('btn-hote');
            const subtitle = document.getElementById('form-subtitle');
            if(type === 'annonceur') {
                btnA.className = "flex-1 py-3 rounded-xl font-bold text-[13px] bg-white shadow-sm text-[#003366]";
                btnH.className = "flex-1 py-3 rounded-xl font-bold text-[13px] text-slate-500";
                subtitle.innerText = "Connectez-vous à votre espace Annonceur";
            } else {
                btnH.className = "flex-1 py-3 rounded-xl font-bold text-[13px] bg-white shadow-sm text-[#003366]";
                btnA.className = "flex-1 py-3 rounded-xl font-bold text-[13px] text-slate-500";
                subtitle.innerText = "Connectez-vous à votre espace Hôte";
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else window.location.href = 'dashboard-annonceur.html';
        }
    </script>
</body>
</html>
