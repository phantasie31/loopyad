<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — LoopyAd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bleu-fonce: #003366;
            --bleu-cyan: #00D1FF;
            --gris-fond: #F8FAFC;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--gris-fond); 
            margin: 0; 
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 80px; 
            background: white; 
            border-bottom: 1px solid #E2E8F0; 
        }
        .logo { height: 35px; }
        
        .main-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .tabs {
            display: flex;
            background: #F1F5F9;
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            color: #64748B;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: white;
            color: var(--bleu-fonce);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        h1 { font-size: 28px; font-weight: 900; color: var(--bleu-fonce); margin-bottom: 8px; }
        .subtitle { color: #64748B; font-size: 15px; margin-bottom: 30px; }

        form { text-align: left; }
        label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 8px; color: #334155; }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            margin-bottom: 20px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .error-message {
            background: #FEF2F2;
            color: #DC2626;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #FEE2E2;
        }

        .btn-login {
            display: block;
            width: 100%;
            background: var(--bleu-fonce);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 800;
            font-size: 15px;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-login:hover { background: #002244; transform: translateY(-2px); }

        .footer-link { margin-top: 25px; font-size: 13px; color: #64748B; }
        .footer-link a { color: var(--bleu-fonce); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">
            <img src="https://i.ibb.co/SHgMNn6/loppyad4.png" class="logo" alt="LoopyAd">
        </a>
        <div style="display: flex; gap: 15px;">
            <a id="auth-button" href="Login.html" style="display:none;">Connexion</a>
            <a id="signup-button" href="choix-inscription.html" style="display:none;">Inscription</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="login-card">
            <h1>Bon retour !</h1>
            <p class="subtitle" id="form-subtitle">Connectez-vous à votre espace Annonceur</p>
            
            <div class="tabs">
                <button id="btn-annonceur" class="tab-btn active" onclick="switchTab('annonceur')">Annonceur</button>
                <button id="btn-hote" class="tab-btn" onclick="switchTab('hote')">Hôte</button>
            </div>

            <div id="error-box" class="error-message"></div>
            
            <form id="login-form">
                <label>Adresse Email</label>
                <input type="email" id="email" placeholder="nom@exemple.com" required>
                
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
                
                <button type="button" id="btn-submit" onclick="handleLogin()" class="btn-login">Se connecter</button>
            </form>

            <div class="footer-link">
                Pas encore de compte ? <a href="choix-inscription.html">S'inscrire</a>
            </div>
        </div>
    </div>

    <div id="universal-footer"></div>

    <script>
        const SUPABASE_URL = 'https://srfxehetueqazykzwrhw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyZnhlaGV0dWVxYXp5a3p3cmh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjQ4NjksImV4cCI6MjA5MjU0MDg2OX0.tqw6lik68x0js0VVm-xAuLFZ17mFf3LM6h5g85eow68';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentType = 'annonceur';

        function switchTab(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(type === 'annonceur') document.getElementById('btn-annonceur').classList.add('active');
            else document.getElementById('btn-hote').classList.add('active');
            document.getElementById('form-subtitle').textContent = `Connectez-vous à votre espace ${type.charAt(0).toUpperCase() + type.slice(1)}`;
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');
            const btn = document.getElementById('btn-submit');

            if(!email || !password) {
                errorBox.textContent = "Veuillez remplir tous les champs.";
                errorBox.style.display = 'block';
                return;
            }

            btn.innerText = "Vérification...";
            btn.disabled = true;

            const tableName = (currentType === 'annonceur') ? 'annonceurs' : 'ecrans';

            try {
                const { data, error } = await _supabase
                    .from(tableName)
                    .select('*')
                    .eq('email', email)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    errorBox.textContent = "Email ou mot de passe incorrect.";
                    errorBox.style.display = 'block';
                    btn.innerText = "Se connecter";
                    btn.disabled = false;
                } else {
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userRole', currentType);
                    window.location.href = (currentType === 'annonceur') ? 'dashboard-annonceur.html' : 'dashboard-hote.html';
                }
            } catch (err) {
                errorBox.style.display = 'block';
                btn.innerText = "Se connecter";
                btn.disabled = false;
            }
        }

        // LE MÊME FOOTER ET LA MÊME LOGIQUE POUR TOUT LE MONDE
        function injectFooter() {
            const footerContainer = document.getElementById('universal-footer');
            if (footerContainer) {
                footerContainer.innerHTML = `
                <footer class="bg-[#0A2540] text-slate-400 py-4">
                    <div class="max-w-7xl mx-auto px-8 grid md:grid-cols-4 gap-12 text-left">
                        <div><h4 class="text-white font-black text-sm uppercase mb-6 tracking-widest">Commerce hôte</h4><a href="hote.html" class="block hover:text-white mb-2 text-sm">Recevoir un écran gratuit</a></div>
                        <div><h4 class="text-white font-black text-sm uppercase mb-6 tracking-widest">Annonceur</h4><a href="inscription-annonceur.html" class="block hover:text-white mb-2 text-sm">Lancer une campagne</a></div>
                        <div><h4 class="text-white font-black text-sm uppercase mb-6 tracking-widest">Application</h4><div class="flex gap-3 mt-2"><a href="#"><img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" style="height:35px;"></a></div></div>
                        <div><h4 class="text-white font-black text-sm uppercase mb-6 tracking-widest">Entreprise</h4><a href="#" class="block hover:text-white mb-2 text-sm">À propos</a></div>
                    </div>
                    <div class="max-w-7xl mx-auto px-8 mt-4 pt-4 border-t border-slate-800 text-[10px] text-center">
                        <div class="flex justify-center gap-x-6 mb-4">
                            <a href="politique-confidentialite.html" class="hover:text-white">Confidentialité</a>
                            <a href="conditions-utilisation.html" class="hover:text-white">Conditions</a>
                            <a href="support.html" class="hover:text-white font-bold text-cyan-400">Support</a>
                        </div>
                        <div class="opacity-50">© 2026 LoopyAd — Marketplace DOOH hyperlocale.</div>
                        <div class="flex justify-center gap-4 mt-2 opacity-50">
                            <a href="admin-login.html" class="hover:text-white">Espace Admin</a>
                            <a href="commercial-login.html" class="hover:text-white">Espace Commerciaux</a>
                        </div>
                    </div>
                </footer>`;
            }
        }

        async function handleAuthVisuals() {
            const { data: { session } } = await _supabase.auth.getSession();
            const authBtn = document.getElementById('auth-button');
            const signupBtn = document.getElementById('signup-button');

            if (session) {
                if (authBtn) {
                    authBtn.style.display = 'block';
                    authBtn.innerText = 'Mon Dashboard';
                    authBtn.href = 'check-profile.html';
                }
                if (signupBtn) signupBtn.style.display = 'none';
            }
        }

        injectFooter();
        handleAuthVisuals();
    </script>
</body>
</html>
