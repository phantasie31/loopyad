<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - LoopyAd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8 bg-white rounded-3xl shadow-2xl border border-slate-100">
        <div class="text-center mb-10">
            <a href="index.html"><img src="https://i.ibb.co/SHgMNn6/loppyad4.png" alt="LoopyAd" class="h-8 mx-auto mb-6"></a>
            <h1 class="text-2xl font-black text-[#003366] tracking-tight">Espace Administrateur</h1>
            <p class="text-slate-500 text-sm mt-2">Accès réservé au personnel autorisé</p>
        </div>
        <form action="dashboard-admin.html" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-2">Identifiant Admin</label>
                <input type="text" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-cyan-400 transition text-sm">
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-2">Mot de passe</label>
                <input type="password" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:border-cyan-400 transition text-sm">
            </div>
            <button type="submit" class="w-full py-4 mt-4 text-white font-black rounded-2xl transition shadow-lg shadow-cyan-500/20" style="background: linear-gradient(135deg, #00D4FF 0%, #0A2540 100%);">
                Se connecter au panel
            </button>
        </form>
        <a href="index.html" class="block text-center mt-8 text-xs font-bold text-slate-400 hover:text-[#003366]">← Retour au site</a>
    </div>
</body>
</html>
